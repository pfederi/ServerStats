name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: App Version
      description: Check in the app or build info
      placeholder: "1.0"
    validations:
      required: true

  - type: dropdown
    id: macos
    attributes:
      label: macOS Version
      options:
        - macOS 14 (Sonoma)
        - macOS 15 (Sequoia)
        - macOS 16 (Tahoe)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
      placeholder: When I click X, Y happens instead of Z
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open the app
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots

  - type: textarea
    id: glances
    attributes:
      label: Glances setup
      description: Glances version, how it's running (Docker, bare metal), reverse proxy setup
      placeholder: "Glances 4.x in Docker behind Caddy"
